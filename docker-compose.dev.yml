# ──────────────────────────────────────────────────────────────────────────────
# espeezy.com — Cloud Dev Stack
#
# Services:
#   app    → Next.js dev server with hot reload (port 3000)
#   caddy  → Reverse proxy + auto-HTTPS via Let's Encrypt (ports 80/443)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f app
#   docker compose -f docker-compose.dev.yml restart app
#
# Environment:
#   Copy .env.local to /opt/espeezy/.env.local before starting.
#   Set CADDY_DOMAIN env var to your domain (e.g. dev.espeezy.com)
#   or leave unset for plain HTTP on the VPS IP.
# ──────────────────────────────────────────────────────────────────────────────
name: espeezy-dev

services:
  # ── Next.js dev server ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: espeezy_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Bind-mount the repo so agents editing files get instant hot reload
      - .:/app:cached
      # Preserve node_modules and .next from the build layer — don't overwrite
      # with the (possibly empty) host directory
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    env_file:
      - .env.local
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      POLL_INTERVAL: "1000"
      NODE_OPTIONS: "--max-old-space-size=2048"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Caddy — auto-HTTPS reverse proxy ─────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: espeezy_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_DOMAIN: "${CADDY_DOMAIN:-localhost}"
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower — auto-pull & restart on new image pushes ─────────────────
  # Uncomment if you push Docker images to a registry instead of bind-mounting
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: espeezy_watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 60 --cleanup espeezy_app

volumes:
  node_modules:
  next_cache:
  caddy_data:
  caddy_config:
